name: lease-rag

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - lease_rag_etcd_data:/etcd
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "--endpoints=http://127.0.0.1:2379",
          "endpoint",
          "health",
        ]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s
    networks:
      - lease-rag-net

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - lease_rag_minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s
    networks:
      - lease-rag-net

  milvus:
    image: milvusdb/milvus:v2.5.10
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "19530:19530"
      - "19091:9091"
    volumes:
      - lease_rag_milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s
    networks:
      - lease-rag-net

  attu:
    image: zilliz/attu:v2.5
    restart: unless-stopped
    profiles:
      - tools
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      milvus:
        condition: service_started
    ports:
      - "18000:3000"
    networks:
      - lease-rag-net

volumes:
  lease_rag_etcd_data:
    name: lease_rag_etcd_data
  lease_rag_minio_data:
    name: lease_rag_minio_data
  lease_rag_milvus_data:
    name: lease_rag_milvus_data

networks:
  lease-rag-net:
    name: lease-rag-net
