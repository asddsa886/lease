server:
  port: 8081
  tomcat:
    threads:
      max: 300
      min-spare: 20
    accept-count: 500
    max-connections: 8192
spring:
  ai:
    model:
      chat: ${SPRING_AI_CHAT_MODEL:openai}
      embedding: ${SPRING_AI_EMBEDDING_MODEL:ollama}
      image: ${SPRING_AI_IMAGE_MODEL:none}
      moderation: ${SPRING_AI_MODERATION_MODEL:none}
      audio:
        speech: ${SPRING_AI_AUDIO_SPEECH_MODEL:none}
        transcription: ${SPRING_AI_AUDIO_TRANSCRIPTION_MODEL:none}
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:http://localhost:18080}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-5.4}
          temperature: ${SPRING_AI_OPENAI_CHAT_OPTIONS_TEMPERATURE:0.2}
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        model: ${SPRING_AI_OLLAMA_EMBEDDING_MODEL:qwen3-embedding:0.6b}
        options:
          model: ${SPRING_AI_OLLAMA_EMBEDDING_OPTIONS_MODEL:qwen3-embedding:0.6b}
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://127.0.0.1:3306/lease?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2b8
    username: root
    password: 123456
    hikari:
      connection-test-query: SELECT 1 # 自动检测连接
      connection-timeout: 60000 #数据库连接超时时间,默认30秒
      idle-timeout: 500000 #空闲连接存活最大时间，默认600000（10分钟）
      max-lifetime: 540000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      maximum-pool-size: 20 #连接池最大连接数，默认是10
      minimum-idle: 10 #最小空闲连接数量
      pool-name: SPHHikariPool # 连接池名称
  jackson:
    time-zone: GMT+8
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true

mq:
  enabled: ${MQ_ENABLED:true}

lease:
  assistant:
    enabled: ${LEASE_ASSISTANT_ENABLED:true}
    conversation-ttl: ${LEASE_ASSISTANT_CONVERSATION_TTL:7d}
    max-history-messages: ${LEASE_ASSISTANT_MAX_HISTORY_MESSAGES:12}
    stream-timeout: ${LEASE_ASSISTANT_STREAM_TIMEOUT:2m}
    rag:
      enabled: ${LEASE_ASSISTANT_RAG_ENABLED:false}
      host: ${LEASE_ASSISTANT_RAG_HOST:localhost}
      port: ${LEASE_ASSISTANT_RAG_PORT:19530}
      connect-timeout-ms: ${LEASE_ASSISTANT_RAG_CONNECT_TIMEOUT_MS:5000}
      collection-name: ${LEASE_ASSISTANT_RAG_COLLECTION:lease_assistant_knowledge}
      id-field-name: ${LEASE_ASSISTANT_RAG_ID_FIELD:id}
      title-field-name: ${LEASE_ASSISTANT_RAG_TITLE_FIELD:title}
      content-field-name: ${LEASE_ASSISTANT_RAG_CONTENT_FIELD:content}
      vector-field-name: ${LEASE_ASSISTANT_RAG_VECTOR_FIELD:vector}
      metadata-field-name: ${LEASE_ASSISTANT_RAG_METADATA_FIELD:metadata}
      top-k: ${LEASE_ASSISTANT_RAG_TOP_K:3}
      max-snippet-length: ${LEASE_ASSISTANT_RAG_MAX_SNIPPET_LENGTH:240}
      metric-type: ${LEASE_ASSISTANT_RAG_METRIC_TYPE:L2}
      nprobe: ${LEASE_ASSISTANT_RAG_NPROBE:10}
  cache:
    hot-data-enabled: ${LEASE_CACHE_HOT_DATA_ENABLED:true}
    local-enabled: ${LEASE_CACHE_LOCAL_ENABLED:true}
    local-max-size: ${LEASE_CACHE_LOCAL_MAX_SIZE:1024}
    local-ttl-sec: ${LEASE_CACHE_LOCAL_TTL_SEC:30}
    local-null-ttl-sec: ${LEASE_CACHE_LOCAL_NULL_TTL_SEC:10}
  mq:
    order-timeout-ttl-ms: ${LEASE_MQ_ORDER_TIMEOUT_TTL_MS:900000}
  async:
    browsing-history:
      core-pool-size: ${LEASE_ASYNC_BROWSING_HISTORY_CORE:2}
      max-pool-size: ${LEASE_ASYNC_BROWSING_HISTORY_MAX:8}
      queue-capacity: ${LEASE_ASYNC_BROWSING_HISTORY_QUEUE:5000}

springdoc:
  default-flat-param-object: true

aliyun:
  sms:
    # P0-安全：敏感信息不要提交到仓库，使用环境变量/配置中心注入
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    endpoint: ${ALIYUN_SMS_ENDPOINT:}
    mock-enabled: ${ALIYUN_SMS_MOCK_ENABLED:true}

# JWT 配置（建议生产环境通过环境变量注入，并定期轮转）
jwt:
  secret: ${JWT_SECRET:}
  ttl: ${JWT_TTL:7d}

# 限流阈值配置（可按环境差异化）
rate-limit:
  app:
    sms:
      ip:
        limit: ${RL_APP_SMS_IP_LIMIT:20}
        window: ${RL_APP_SMS_IP_WINDOW:60s}
      phone:
        limit: ${RL_APP_SMS_PHONE_LIMIT:3}
        window: ${RL_APP_SMS_PHONE_WINDOW:60s}
    login:
      ip:
        limit: ${RL_APP_LOGIN_IP_LIMIT:30}
        window: ${RL_APP_LOGIN_IP_WINDOW:60s}
      phone:
        limit: ${RL_APP_LOGIN_PHONE_LIMIT:10}
        window: ${RL_APP_LOGIN_PHONE_WINDOW:60s}

    appointment:
      user-id:
        limit: ${RL_APP_APPOINTMENT_USER_LIMIT:5}
        window: ${RL_APP_APPOINTMENT_USER_WINDOW:60s}
      ip:
        limit: ${RL_APP_APPOINTMENT_IP_LIMIT:60}
        window: ${RL_APP_APPOINTMENT_IP_WINDOW:60s}

