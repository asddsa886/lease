server:
  port: 8081
  tomcat:
    threads:
      max: 300
      min-spare: 20
    accept-count: 500
    max-connections: 8192
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://127.0.0.1:3306/lease?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2b8
    username: root
    password: 123456
    hikari:
      connection-test-query: SELECT 1 # 自动检测连接
      connection-timeout: 60000 #数据库连接超时时间,默认30秒
      idle-timeout: 500000 #空闲连接存活最大时间，默认600000（10分钟）
      max-lifetime: 540000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      maximum-pool-size: 20 #连接池最大连接数，默认是10
      minimum-idle: 10 #最小空闲连接数量
      pool-name: SPHHikariPool # 连接池名称
  jackson:
    time-zone: GMT+8
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/lease_assistant}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true

mq:
  enabled: ${MQ_ENABLED:false}

lease:
  cache:
    hot-data-enabled: ${LEASE_CACHE_HOT_DATA_ENABLED:true}
  async:
    browsing-history:
      core-pool-size: ${LEASE_ASYNC_BROWSING_HISTORY_CORE:2}
      max-pool-size: ${LEASE_ASYNC_BROWSING_HISTORY_MAX:8}
      queue-capacity: ${LEASE_ASYNC_BROWSING_HISTORY_QUEUE:5000}

springdoc:
  default-flat-param-object: true

aliyun:
  sms:
    # P0-安全：敏感信息不要提交到仓库，使用环境变量/配置中心注入
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    endpoint: ${ALIYUN_SMS_ENDPOINT:}
    mock-enabled: ${ALIYUN_SMS_MOCK_ENABLED:true}

# JWT 配置（建议生产环境通过环境变量注入，并定期轮转）
jwt:
  secret: ${JWT_SECRET:}
  ttl: ${JWT_TTL:7d}

# 限流阈值配置（可按环境差异化）
rate-limit:
  app:
    sms:
      ip:
        limit: ${RL_APP_SMS_IP_LIMIT:20}
        window: ${RL_APP_SMS_IP_WINDOW:60s}
      phone:
        limit: ${RL_APP_SMS_PHONE_LIMIT:3}
        window: ${RL_APP_SMS_PHONE_WINDOW:60s}
    login:
      ip:
        limit: ${RL_APP_LOGIN_IP_LIMIT:30}
        window: ${RL_APP_LOGIN_IP_WINDOW:60s}
      phone:
        limit: ${RL_APP_LOGIN_PHONE_LIMIT:10}
        window: ${RL_APP_LOGIN_PHONE_WINDOW:60s}

    appointment:
      user-id:
        limit: ${RL_APP_APPOINTMENT_USER_LIMIT:5}
        window: ${RL_APP_APPOINTMENT_USER_WINDOW:60s}
      ip:
        limit: ${RL_APP_APPOINTMENT_IP_LIMIT:60}
        window: ${RL_APP_APPOINTMENT_IP_WINDOW:60s}

app:
  ai:
    assistant:
      enabled: ${APP_AI_ASSISTANT_ENABLED:true}
      provider: ${APP_AI_ASSISTANT_PROVIDER:openai-compatible}
      base-url: ${APP_AI_ASSISTANT_BASE_URL:https://elysia.h-e.top/v1}
      model-name: ${APP_AI_ASSISTANT_MODEL:gpt-5-nano}
      api-key: ${APP_AI_ASSISTANT_API_KEY:sk-sg6Hw8s92ZiIhSDVybMrSWgy3rSOTgxxROH2BwmCdmWRQV0L}
      temperature: ${APP_AI_ASSISTANT_TEMPERATURE:0.2}
      timeout: ${APP_AI_ASSISTANT_TIMEOUT:60s}
      max-retries: ${APP_AI_ASSISTANT_MAX_RETRIES:0}
      log-requests: ${APP_AI_ASSISTANT_LOG_REQUESTS:false}
      log-responses: ${APP_AI_ASSISTANT_LOG_RESPONSES:false}
      max-search-results: ${APP_AI_ASSISTANT_MAX_SEARCH_RESULTS:5}
      memory-enabled: ${APP_AI_ASSISTANT_MEMORY_ENABLED:true}
      mongo-memory-enabled: ${APP_AI_ASSISTANT_MONGO_MEMORY_ENABLED:true}
      max-memory-messages: ${APP_AI_ASSISTANT_MAX_MEMORY_MESSAGES:20}
      rag-enabled: ${APP_AI_ASSISTANT_RAG_ENABLED:true}
      knowledge-location: ${APP_AI_ASSISTANT_KNOWLEDGE_LOCATION:classpath*:assistant-knowledge/*.md}
      max-knowledge-matches: ${APP_AI_ASSISTANT_MAX_KNOWLEDGE_MATCHES:2}
      max-knowledge-chars: ${APP_AI_ASSISTANT_MAX_KNOWLEDGE_CHARS:1200}
