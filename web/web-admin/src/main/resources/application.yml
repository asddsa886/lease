server:
  port: 8080
spring:
  ai:
    model:
      embedding: ${SPRING_AI_EMBEDDING_MODEL:ollama}
      chat: ${SPRING_AI_CHAT_MODEL:none}
      image: ${SPRING_AI_IMAGE_MODEL:none}
      moderation: ${SPRING_AI_MODERATION_MODEL:none}
      audio:
        speech: ${SPRING_AI_AUDIO_SPEECH_MODEL:none}
        transcription: ${SPRING_AI_AUDIO_TRANSCRIPTION_MODEL:none}
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        model: ${SPRING_AI_OLLAMA_EMBEDDING_MODEL:qwen3-embedding:0.6b}
        options:
          model: ${SPRING_AI_OLLAMA_EMBEDDING_OPTIONS_MODEL:qwen3-embedding:0.6b}
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://127.0.0.1:3306/lease?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2b8
    username: root
    password: 123456
    hikari:
      connection-test-query: SELECT 1 # 自动检测连接
      connection-timeout: 60000 #数据库连接超时时间,默认30秒
      idle-timeout: 500000 #空闲连接存活最大时间，默认600000（10分钟）
      max-lifetime: 540000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      maximum-pool-size: 12 #连接池最大连接数，默认是10
      minimum-idle: 10 #最小空闲连接数量
      pool-name: SPHHikariPool # 连接池名称
  jackson:
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 10MB        # 图片场景
      # max-file-size: 100MB     # 视频场景
      # max-file-size: 500MB     # 大文件场景
      max-request-size: 50MB     # 应该比max-file-size大

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true

mq:
  enabled: ${MQ_ENABLED:true}

lease:
  assistant:
    rag:
      enabled: ${LEASE_ASSISTANT_RAG_ENABLED:false}
      host: ${LEASE_ASSISTANT_RAG_HOST:localhost}
      port: ${LEASE_ASSISTANT_RAG_PORT:19530}
      connect-timeout-ms: ${LEASE_ASSISTANT_RAG_CONNECT_TIMEOUT_MS:5000}
      collection-name: ${LEASE_ASSISTANT_RAG_COLLECTION:lease_assistant_knowledge}
      id-field-name: ${LEASE_ASSISTANT_RAG_ID_FIELD:id}
      title-field-name: ${LEASE_ASSISTANT_RAG_TITLE_FIELD:title}
      content-field-name: ${LEASE_ASSISTANT_RAG_CONTENT_FIELD:content}
      vector-field-name: ${LEASE_ASSISTANT_RAG_VECTOR_FIELD:vector}
      metadata-field-name: ${LEASE_ASSISTANT_RAG_METADATA_FIELD:metadata}
      metric-type: ${LEASE_ASSISTANT_RAG_METRIC_TYPE:L2}
      nprobe: ${LEASE_ASSISTANT_RAG_NPROBE:10}
      chunk-max-length: ${LEASE_ASSISTANT_RAG_CHUNK_MAX_LENGTH:600}
      chunk-overlap: ${LEASE_ASSISTANT_RAG_CHUNK_OVERLAP:80}
      title-max-length: ${LEASE_ASSISTANT_RAG_TITLE_MAX_LENGTH:255}
      content-max-length: ${LEASE_ASSISTANT_RAG_CONTENT_MAX_LENGTH:4000}
      metadata-max-length: ${LEASE_ASSISTANT_RAG_METADATA_MAX_LENGTH:2000}
      index-type: ${LEASE_ASSISTANT_RAG_INDEX_TYPE:IVF_FLAT}
      nlist: ${LEASE_ASSISTANT_RAG_NLIST:128}
  mq:
    order-timeout-ttl-ms: ${LEASE_MQ_ORDER_TIMEOUT_TTL_MS:900000}
  outbox:
    retry-owner: ${LEASE_OUTBOX_RETRY_OWNER:admin}
    retry-delay-ms: ${LEASE_OUTBOX_RETRY_DELAY_MS:5000}


# 用于打印框架生成的 sql 语句，便于调试（建议仅在开发环境开启）
# 关掉控制台刷屏：注释掉 StdOutImpl（会输出 Preparing/Parameters/SQLStructure 等）
mybatis-plus:
  # configuration:
  #   log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted # 全局逻辑删除的实体字段名(配置后可以忽略不配置步骤二)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)

# 进一步降噪（可选）：控制框架日志级别
logging:
  level:
    org.mybatis: warn
    com.baomidou.mybatisplus: warn

minio:
  # P0-安全：敏感信息不要提交到仓库，使用环境变量/配置中心注入
  # 为空时（默认）不会初始化 MinioClient（见 MinioConfiguration 的条件装配）
  endpoint: ${MINIO_ENDPOINT:}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket-name: ${MINIO_BUCKET_NAME:}

# JWT 配置（建议生产环境通过环境变量注入，并定期轮转）
jwt:
  secret: ${JWT_SECRET:}
  ttl: ${JWT_TTL:7d}

# 限流阈值配置（可按环境差异化）
rate-limit:
  admin:
    captcha:
      limit: ${RL_ADMIN_CAPTCHA_LIMIT:30}
      window: ${RL_ADMIN_CAPTCHA_WINDOW:60s}
    login:
      limit: ${RL_ADMIN_LOGIN_LIMIT:20}
      window: ${RL_ADMIN_LOGIN_WINDOW:60s}

springdoc:
  default-flat-param-object: true
